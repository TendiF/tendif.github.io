<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="css/custom.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00897B" />
</head>

<body>
    <!-- Navigasi -->
    <nav class="teal lighten-1" role="navigation">
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo" id="logo-container">News Reader</a>
            <a href="#" class="sidenav-trigger" data-target="nav-mobile">☰</a>

            <ul class="topnav right hide-on-med-and-down"></ul>
            <ul class="sidenav" id="nav-mobile"></ul>
        </div>
    </nav>
    <!-- Akhir Navigasi -->
    <div class="container center" id="body-content">

    </div>
    <div class="loading">
        <div>
            <img class="splash-img" src="icon.png" alt="">
            <div>
                <div class="loading-c"></div>
                <div class="loading-c"></div>
                <div class="loading-c"></div>
            </div>
        </div>
    </div>
    <script src="js/materialize.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/idb.js"></script>
    <script src="js/custom.js"></script>
    <script>
        setTimeout(() => {
            document.getElementsByClassName("container")[0].style.display = "block"
            document.getElementsByClassName("loading")[0].style.display = "none"
        }, 3000)
        // REGISTER SERVICE WORKER
        if ("serviceWorker" in navigator) {
            registerServiceWorker()
            requestPermission()
        } else {
            console.log("ServiceWorker belum didukung browser ini.");
        }
        function registerServiceWorker() {
            window.addEventListener("load", function () {
                navigator.serviceWorker
                    .register("service-worker.js")
                    .then(function () {
                        console.log("Pendaftaran ServiceWorker berhasil");
                    })
                    .catch(function () {
                        console.log("Pendaftaran ServiceWorker gagal");
                    });
            });
        }

        function requestPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(function (result) {
                    if (result === "denied") {
                        console.log("Fitur notifikasi tidak diijinkan.");
                        return;
                    } else if (result === "default") {
                        console.error("Pengguna menutup kotak dialog permintaan ijin.");
                        return;
                    }

                    if (('PushManager' in window)) {
                        navigator.serviceWorker.getRegistration().then(function (registration) {
                            registration.pushManager.subscribe({
                                userVisibleOnly: true,
                                applicationServerKey: urlBase64ToUint8Array("BAeGWaQrWMNBqJ2Qjigxrl4rLWNFMYLx60KKF8yy3ojggwt7rgv85iw0yBigznuQ1dVNRgb6MCcM6NJvrfFohBI")
                            }).then(function (subscribe) {
                                console.log('Berhasil melakukan subscribe dengan endpoint: ', subscribe.endpoint);
                                console.log('Berhasil melakukan subscribe dengan p256dh key: ', btoa(String.fromCharCode.apply(
                                    null, new Uint8Array(subscribe.getKey('p256dh')))));
                                console.log('Berhasil melakukan subscribe dengan auth key: ', btoa(String.fromCharCode.apply(
                                    null, new Uint8Array(subscribe.getKey('auth')))));
                            }).catch(function (e) {
                                console.error('Tidak dapat melakukan subscribe ', e.message);
                            });
                        });
                    }
                });
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            getArticles();
        });

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding)
                .replace(/-/g, '+')
                .replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
    </script>
</body>

</html>
